name: "ffuf"
command: "ffuf"
args:
  - "-json"
  - "-s"
  - "-noninteractive"
enabled: true
short_description: "Fuzz web paths or parameters with restrained default concurrency."
description: |
  Use ffuf for in-scope directory, file, or parameter discovery.
  Provide a URL containing FUZZ.
parameters:
  - name: "url"
    type: "string"
    description: "Target URL containing the FUZZ keyword."
    required: true
    flag: "-u"
  - name: "wordlist"
    type: "string"
    description: "Absolute or working-directory-relative wordlist path."
    required: false
    default: ".tools/wordlists/common.txt"
    flag: "-w"
  - name: "method"
    type: "string"
    description: "HTTP method."
    default: "GET"
    flag: "-X"
    options:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "HEAD"
      - "OPTIONS"
  - name: "header"
    type: "string"
    description: "Single extra header in Key: Value format."
    flag: "-H"
  - name: "body"
    type: "string"
    description: "Raw request body."
    flag: "-d"
  - name: "match_status"
    type: "string"
    description: "Status codes to match."
    default: "200,204,301,302,307,401,403"
    flag: "-mc"
  - name: "filter_status"
    type: "string"
    description: "Status codes to filter."
    default: "404"
    flag: "-fc"
  - name: "threads"
    type: "int"
    description: "Worker thread count."
    default: 5
    flag: "-t"
  - name: "rate"
    type: "int"
    description: "Maximum requests per second."
    default: 20
    flag: "-rate"
  - name: "timeout_seconds"
    type: "int"
    description: "HTTP timeout in seconds."
    default: 10
    flag: "-timeout"
  - name: "follow_redirects"
    type: "bool"
    description: "Follow redirects."
    flag: "-r"
  - name: "insecure_tls"
    type: "bool"
    description: "Allow invalid TLS certificates."
    flag: "-k"
