name: "http-framework-test"
command: "http-framework-test"
enabled: true
short_description: "Run one structured HTTP request and summarize headers, framework hints, forms, and links."
description: |
  Perform a single HTTP(S) request against an allowlisted URL and return a structured summary.
  The url parameter is still subject to security.guardrails.allowed_targets.
parameters:
  - name: "method"
    type: "string"
    description: "HTTP method. Defaults to GET."
    default: "GET"
    flag: "-method"
    options:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "HEAD"
      - "OPTIONS"
  - name: "headers"
    type: "string"
    description: "Extra headers as newline-separated Key: Value lines."
    flag: "-headers"
  - name: "body"
    type: "string"
    description: "Raw request body."
    flag: "-body"
  - name: "user_agent"
    type: "string"
    description: "Custom User-Agent header."
    flag: "-user-agent"
  - name: "follow_redirects"
    type: "bool"
    description: "Follow HTTP redirects up to 10 hops."
    flag: "-follow-redirects"
  - name: "insecure_tls"
    type: "bool"
    description: "Allow invalid TLS certificates."
    flag: "-insecure-tls"
  - name: "timeout_seconds"
    type: "int"
    description: "Request timeout in seconds."
    default: 15
    flag: "-timeout-seconds"
  - name: "max_body_bytes"
    type: "int"
    description: "Maximum number of response bytes captured for analysis."
    default: 32768
    flag: "-max-body-bytes"
  - name: "url"
    type: "string"
    description: "Full HTTP(S) URL within the configured allowlist."
    required: true
    flag: "-url"
